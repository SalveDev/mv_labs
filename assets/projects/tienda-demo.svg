<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Vista previa de una tienda digital</title>
  <desc id="desc">Interfaz genérica de comercio electrónico en tonos grafito, verde oliva y coral.</desc>
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#12191c"/><stop offset="1" stop-color="#24333a"/></linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#b9ca7a"/><stop offset="1" stop-color="#8fa46a"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#07090a" flood-opacity=".42"/></filter>
  </defs>

  <rect width="1200" height="760" rx="32" fill="#0a0d0e"/>
  <rect x="34" y="34" width="1132" height="692" rx="26" fill="url(#page)" stroke="#3c4a4e" stroke-width="3" filter="url(#shadow)"/>

