  <rect x="1010" y="54" width="112" height="40" rx="20" fill="none" stroke="#687579"/><text x="1035" y="80" fill="#f4f2ed" font-family="Arial, sans-serif" font-size="13" font-weight="700">Carrito · 0</text>

  <text x="82" y="185" fill="#b9ca7a" font-family="Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="2.5">UNA EXPERIENCIA DE COMPRA COMPLETA</text>
  <text x="78" y="304" fill="#f8f5ef" font-family="Arial, sans-serif" font-size="80" font-weight="800" letter-spacing="-4">Todo lo que</text>
  <text x="78" y="384" fill="#f8f5ef" font-family="Arial, sans-serif" font-size="80" font-weight="800" letter-spacing="-4">buscas.</text>
  <text x="82" y="438" fill="#b8c0c2" font-family="Arial, sans-serif" font-size="19">Una tienda flexible para presentar, organizar</text>
  <text x="82" y="468" fill="#b8c0c2" font-family="Arial, sans-serif" font-size="19">y vender productos de cualquier categoría.</text>
  <rect x="82" y="520" width="150" height="50" rx="25" fill="#b9ca7a"/><text x="117" y="551" fill="#172023" font-family="Arial, sans-serif" font-size="14" font-weight="800">VER CATÁLOGO</text>
